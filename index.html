<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💬</text></svg>">
    <title>ICQ-чат</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        *{box-sizing:border-box;margin:0;padding:0}
        html,body{width:100%;height:100%;margin:0;padding:0;font-family:-apple-system,'Segoe UI',Roboto,Arial,sans-serif;background:#1a1a1e;overflow:hidden;color:#e5e5ea}
        body{display:flex;flex-direction:column}
        :root{--bg-primary:#1a1a1e;--bg-secondary:#2c2c30;--bg-panel:#242428;--bg-input:#1c1c20;--bg-hover:#33333a;--bg-active:#3a3a44;--border-color:#3a3a40;--text-primary:#e5e5ea;--text-secondary:#8e8e93;--text-muted:#636366;--accent:#0a84ff;--accent-hover:#0070e0;--success:#30d158;--danger:#ff453a;--shadow:rgba(0,0,0,0.3);--bubble-mine:#0a84ff;--bubble-other:#2c2c30;--modal-bg:rgba(0,0,0,0.7)}
        [data-theme="light"]{--bg-primary:#f0f0f2;--bg-secondary:#ffffff;--bg-panel:#f8f8fa;--bg-input:#ffffff;--bg-hover:#e5e5ea;--bg-active:#d1d1d6;--border-color:#c6c6c8;--text-primary:#1c1c1e;--text-secondary:#3a3a3c;--text-muted:#8e8e93;--accent:#007aff;--accent-hover:#0055cc;--shadow:rgba(0,0,0,0.1);--bubble-mine:#007aff;--bubble-other:#e5e5ea;--modal-bg:rgba(0,0,0,0.5)}
        .chat-app{display:flex;width:100%;height:100vh;height:100dvh;background:var(--bg-secondary);overflow:hidden;position:relative}
        .contact-panel{width:280px;background:var(--bg-panel);border-right:1px solid var(--border-color);display:flex;flex-direction:column;flex-shrink:0;height:100%;overflow:hidden;transition:transform .3s,background .3s;z-index:10}
        .contact-panel .header{padding:14px 18px 10px;border-bottom:1px solid var(--border-color);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
        .contact-panel .header .title{font-weight:700;font-size:20px;color:var(--text-primary);display:flex;align-items:baseline;gap:6px}
        .contact-panel .header .title .username{font-weight:400;font-size:16px;color:var(--text-secondary)}
        .contact-panel .header .profile-icon{width:38px;height:38px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:17px;cursor:pointer;overflow:hidden;background-size:cover;background-position:center;flex-shrink:0}
        .login-area{display:flex;flex-wrap:wrap;gap:6px;padding:8px 14px 12px;border-bottom:1px solid var(--border-color);align-items:center;flex-shrink:0}
        .login-area input{flex:1 1 100px;min-width:60px;padding:8px 12px;border:1px solid var(--border-color);border-radius:20px;font-size:14px;outline:0;background:var(--bg-input);color:var(--text-primary)}
        .login-area input:focus{border-color:var(--accent)}
        .login-area .password-wrapper{position:relative;flex:1 1 100px;min-width:60px}
        .login-area .password-wrapper input{width:100%;padding:8px 12px;border:1px solid var(--border-color);border-radius:20px;font-size:14px;outline:0;background:var(--bg-input);color:var(--text-primary);padding-right:36px}
        .login-area .password-wrapper .toggle-password{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:0 0;border:none;color:var(--text-secondary);cursor:pointer;font-size:18px;padding:0}
        .login-area button{flex:0 0 auto;padding:8px 18px;background:var(--accent);color:#fff;border:none;border-radius:20px;font-weight:600;cursor:pointer;font-size:14px;white-space:nowrap;box-shadow:0 2px 8px rgba(10,132,255,.3);transition:transform .15s}
        .login-area button:active{transform:scale(.92)}
        .login-area button:hover{background:var(--accent-hover)}
        .login-area .auth-buttons{display:flex;gap:6px}
        .contact-tools{padding:6px 14px;display:flex;gap:6px;border-bottom:1px solid var(--border-color);flex-shrink:0}
        .contact-tools button{flex:1;background:var(--bg-secondary);border:1px solid var(--border-color);border-radius:16px;padding:6px 12px;color:var(--text-primary);font-size:13px;cursor:pointer;transition:transform .15s}
        .contact-tools button:active{transform:scale(.94)}
        .contact-tools button:hover{background:var(--bg-hover)}
        .contact-list{flex:1;overflow-y:auto;padding:6px 0}
        .contact-item{padding:10px 16px;cursor:pointer;display:flex;align-items:center;gap:12px;border-bottom:1px solid var(--border-color);touch-action:manipulation;transition:background .15s;position:relative}
        .contact-item:hover{background:var(--bg-hover)}
        .contact-item.active{background:var(--bg-active)}
        .contact-item .avatar{width:44px;height:44px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;flex-shrink:0;position:relative;overflow:hidden}
        .contact-item .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
        .contact-item .avatar .initials{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;background:var(--accent)}
        .contact-item .avatar img~.initials{display:none}
        .contact-item .avatar .online-dot{position:absolute;bottom:2px;right:2px;width:12px;height:12px;background:var(--success);border-radius:50%;border:2px solid var(--bg-panel)}
        .contact-item .info{flex:1;min-width:0}
        .contact-item .info .name{font-weight:600;font-size:15px;color:var(--text-primary)}
        .contact-item .info .last-msg{font-size:13px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px}
        .contact-item .time{font-size:11px;color:var(--text-muted);flex-shrink:0;align-self:flex-start;margin-top:4px}
        .contact-item .unread-badge{background:var(--danger);color:#fff;border-radius:50%;min-width:20px;height:20px;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 5px;position:absolute;right:10px;top:50%;transform:translateY(-50%)}
        .contact-item .remove-contact{background:0 0;border:none;color:var(--text-muted);font-size:16px;cursor:pointer;padding:0 4px;transition:color .15s}
        .contact-item .remove-contact:hover{color:var(--danger)}
        .chat-panel{flex:1;display:flex;flex-direction:column;background:var(--bg-primary);min-width:0;height:100%;position:relative;transition:background .3s}
        .chat-header{padding:12px 18px;background:var(--bg-panel);border-bottom:1px solid var(--border-color);display:flex;align-items:center;gap:12px;flex-shrink:0;transition:background .3s}
        .chat-header .avatar{width:34px;height:34px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;flex-shrink:0;overflow:hidden;position:relative}
        .chat-header .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
        .chat-header .avatar .initials{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
        .chat-header .name{font-weight:600;font-size:17px;color:var(--text-primary)}
        .chat-header .status{font-size:12px;color:var(--success);margin-left:6px}
        .chat-header .header-actions{margin-left:auto;display:flex;gap:6px}
        .chat-header .header-actions button{background:0 0;border:none;color:var(--text-secondary);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:8px;transition:background .15s}
        .chat-header .header-actions button:hover{background:var(--bg-hover)}
        .messages-area{flex:1;overflow-y:auto;padding:14px 18px;display:flex;flex-direction:column;gap:8px;background:var(--bg-primary);-webkit-overflow-scrolling:touch;position:relative}
        .message-row{display:flex;gap:10px;align-items:flex-start;max-width:82%;position:relative;transition:background .3s}
        .message-row.mine{align-self:flex-end;flex-direction:row-reverse}
        .message-row .avatar{width:30px;height:30px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:13px;flex-shrink:0;overflow:hidden;position:relative;cursor:pointer}
        .message-row .avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
        .message-row .avatar .initials{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;background:var(--accent)}
        .message-row .avatar img~.initials{display:none}
        .message-row .bubble{background:var(--bubble-other);padding:8px 14px;border-radius:18px;word-wrap:break-word;max-width:100%;box-shadow:0 1px 2px var(--shadow);position:relative;color:var(--text-primary);transition:background .3s,color .3s}
        .message-row.mine .bubble{background:var(--bubble-mine);color:#fff}
        .message-row.mine .bubble .sender{color:rgba(255,255,255,.7)}
        .message-row .bubble .sender{font-weight:600;font-size:12px;color:var(--accent);margin-bottom:2px}
        .message-row .bubble .text{font-size:15px;line-height:1.4;word-wrap:break-word;overflow-wrap:break-word}
        .message-status{display:inline-flex;align-items:center;gap:1px;margin-left:4px;font-size:14px;letter-spacing:-2px}
        .message-status .check{display:inline-block;font-size:14px;line-height:1;color:var(--text-muted);opacity:.6}
        .message-status .check.delivered{color:var(--success);opacity:1}
        .message-status .check.read{color:var(--accent);opacity:1}
        .message-status .check.sending{color:var(--text-muted);opacity:.4;animation:blink 1s infinite}
        @keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}
        .message-row.mine .bubble .time-status-wrap,.message-row .bubble .time-status-wrap{display:flex;align-items:center;justify-content:flex-end;gap:4px;margin-top:2px}
        .message-row .bubble .time{font-size:10px;color:var(--text-muted)}
        .message-row.mine .bubble .time{color:rgba(255,255,255,.6)}
        .file-link{display:inline-block;padding:6px 16px;background:var(--accent);color:#fff;border:none;border-radius:12px;font-weight:500;cursor:pointer;margin:4px 0}
        .file-link:hover{background:var(--accent-hover)}
        .message-row.mine .file-link{background:rgba(255,255,255,.2);color:#fff}
        .message-row.mine .file-link:hover{background:rgba(255,255,255,.3)}
        .file-info{font-size:11px;color:var(--text-muted);margin-top:2px}
        .copy-btn{display:inline-block;margin-top:4px;background:rgba(255,255,255,.05);color:var(--text-secondary);border:1px solid var(--border-color);border-radius:12px;padding:2px 10px;font-size:11px;cursor:pointer}
        .copy-btn:hover{background:rgba(255,255,255,.1)}
        .input-area{padding:10px 14px;background:var(--bg-panel);border-top:1px solid var(--border-color);display:flex;flex-wrap:wrap;gap:6px;align-items:center;flex-shrink:0;position:relative;transition:background .3s}
        .input-area .recipient{display:flex;align-items:center;gap:4px;font-size:13px;color:var(--text-secondary);flex:0 0 auto;position:relative}
        .input-area .recipient input{width:80px;padding:6px 10px;border:1px solid var(--border-color);border-radius:20px;font-size:13px;background:var(--bg-input);color:var(--text-primary);cursor:pointer}
        .input-area .recipient input:focus{border-color:var(--accent);outline:0}
        .input-area .recipient .dropdown{display:none;position:absolute;bottom:100%;left:0;background:var(--bg-panel);border:1px solid var(--border-color);border-radius:12px 12px 0 0;max-height:150px;overflow-y:auto;min-width:120px;z-index:100;box-shadow:0 -4px 16px var(--shadow)}
        .input-area .recipient .dropdown.active{display:block}
        .input-area .recipient .dropdown div{padding:8px 14px;color:var(--text-primary);cursor:pointer;border-bottom:1px solid var(--border-color)}
        .input-area .recipient .dropdown div:hover{background:var(--bg-hover)}
        .input-area .recipient .dropdown div:last-child{border-bottom:none}
        .input-area .message-input{flex:1 1 120px;min-width:60px;padding:10px 16px;border:1px solid var(--border-color);border-radius:25px;outline:0;font-size:15px;background:var(--bg-input);color:var(--text-primary);transition:background .3s,color .3s,border-color .3s}
        .input-area .message-input:focus{border-color:var(--accent)}
        .input-area .message-input:disabled{opacity:.4}
        .emoji-btn{background:0 0;border:none;font-size:24px;cursor:pointer;padding:8px;border-radius:50%;transition:transform .15s,background .15s;touch-action:manipulation;color:var(--text-secondary);box-shadow:0 2px 8px var(--shadow);line-height:1}
        .emoji-btn:active{transform:scale(.9)}
        .emoji-btn:hover{background:var(--bg-hover)}
        .emoji-panel{display:none;position:absolute;bottom:100%;left:0;right:0;background:var(--bg-panel);border:1px solid var(--border-color);border-radius:16px 16px 0 0;padding:10px 14px;max-height:200px;overflow-y:auto;z-index:200;box-shadow:0 -4px 20px var(--shadow);grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:6px;justify-items:center}
        .emoji-panel.active{display:grid}
        .emoji-panel span{font-size:28px;cursor:pointer;padding:4px;border-radius:8px;transition:background .15s;text-align:center;user-select:none;width:100%;line-height:1.4}
        .emoji-panel span:hover{background:var(--bg-hover)}
        .emoji-panel span:active{transform:scale(.9)}
        .input-area .file-btn{background:0 0;border:none;font-size:22px;cursor:pointer;padding:8px;border-radius:50%;transition:transform .15s,background .15s;touch-action:manipulation;color:var(--text-secondary);box-shadow:0 2px 8px var(--shadow)}
        .input-area .file-btn:active{transform:scale(.9)}
        .input-area .file-btn:hover{background:var(--bg-hover)}
        .input-area .send-btn{background:var(--accent);border:none;border-radius:25px;padding:10px 22px;color:#fff;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;touch-action:manipulation;flex:0 0 auto;box-shadow:0 2px 8px rgba(10,132,255,.3)}
        .input-area .send-btn:active{transform:scale(.92)}
        .input-area .send-btn:hover{background:var(--accent-hover)}
        .input-area .send-btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none}
        #fileInput{display:none}
        .status-bar{text-align:center;font-size:12px;color:var(--success);padding:4px 0;background:var(--bg-panel);border-bottom:1px solid var(--border-color);flex-shrink:0;transition:background .3s}
        .status-bar.error{color:var(--danger)}
        .status-bar.warning{color:#ffd60a}
        .context-menu{display:none;position:fixed;background:var(--bg-panel);border:1px solid var(--border-color);border-radius:12px;box-shadow:0 8px 30px var(--shadow);padding:6px 0;z-index:1000;min-width:180px}
        .context-menu button{display:block;width:100%;padding:10px 20px;border:none;background:0 0;text-align:left;font-size:14px;cursor:pointer;touch-action:manipulation;color:var(--text-primary);transition:background .15s}
        .context-menu button:hover{background:var(--bg-hover)}
        .context-menu .submenu{display:none;position:absolute;left:100%;top:0;background:var(--bg-panel);border:1px solid var(--border-color);border-radius:12px;min-width:150px;padding:6px 0;box-shadow:0 8px 30px var(--shadow)}
        .context-menu .submenu.active{display:block}
        .context-menu .submenu button{font-size:20px;padding:6px 14px;text-align:center}
        .context-menu .has-submenu{display:flex;justify-content:space-between;align-items:center}
        .context-menu .has-submenu::after{content:'▶';font-size:12px;color:var(--text-muted)}
        .modal-overlay{display:none;position:fixed;inset:0;background:var(--modal-bg);z-index:2000;justify-content:center;align-items:center}
        .modal-overlay.active{display:flex}
        .modal{background:var(--bg-panel);border-radius:16px;padding:24px 28px;max-width:400px;width:90%;box-shadow:0 20px 60px var(--shadow);border:1px solid var(--border-color)}
        .modal .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
        .modal .modal-header h2{font-size:20px;color:var(--text-primary)}
        .modal .modal-header .close-btn{background:0 0;border:none;font-size:24px;color:var(--text-secondary);cursor:pointer;padding:4px 8px}
        .modal .modal-header .close-btn:hover{color:var(--danger)}
        .modal .setting-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--border-color)}
        .modal .setting-item:last-child{border-bottom:none}
        .modal .setting-item .label{font-size:15px;color:var(--text-primary)}
        .modal .setting-item .desc{font-size:12px;color:var(--text-muted);margin-top:2px}
        .modal .toggle-switch{position:relative;width:48px;height:28px;background:var(--text-muted);border-radius:14px;cursor:pointer;transition:background .3s;flex-shrink:0}
        .modal .toggle-switch.active{background:var(--accent)}
        .modal .toggle-switch .slider{position:absolute;top:2px;left:2px;width:24px;height:24px;background:#fff;border-radius:50%;transition:transform .3s;box-shadow:0 2px 4px rgba(0,0,0,.2)}
        .modal .toggle-switch.active .slider{transform:translateX(20px)}
        .bottom-sheet{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg-panel);border-radius:16px 16px 0 0;padding:16px 20px 30px;z-index:1001;box-shadow:0 -8px 30px var(--shadow);transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:60vh;overflow-y:auto}
        .bottom-sheet.active{display:block;transform:translateY(0)}
        .bottom-sheet .handle{width:40px;height:4px;background:var(--text-muted);border-radius:2px;margin:0 auto 16px}
        .bottom-sheet button{display:block;width:100%;padding:12px 16px;border:none;background:0 0;text-align:left;font-size:15px;color:var(--text-primary);cursor:pointer;border-bottom:1px solid var(--border-color);touch-action:manipulation}
        .bottom-sheet button:last-child{border-bottom:none}
        .bottom-sheet button:active{background:var(--bg-hover)}
        .bottom-sheet .cancel-btn{color:var(--danger);font-weight:600;border-top:1px solid var(--border-color);margin-top:8px;padding-top:16px}
        .bottom-sheet-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000}
        .bottom-sheet-overlay.active{display:block}
        .mobile-back-btn{display:none;background:0 0;border:none;color:var(--accent);font-size:24px;cursor:pointer;padding:8px;touch-action:manipulation}
        .chat-header .mobile-back{display:none;background:0 0;border:none;color:var(--accent);font-size:24px;cursor:pointer;padding:4px 8px;touch-action:manipulation}
        .contact-panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
        .contact-panel-overlay.active{display:block}
        .new-messages-btn{position:absolute;bottom:80px;right:20px;background:var(--accent);color:#fff;border:none;border-radius:30px;padding:8px 16px;font-size:13px;font-weight:600;box-shadow:0 4px 16px rgba(10,132,255,.4);cursor:pointer;display:none;align-items:center;gap:6px;transition:transform .2s;z-index:50;touch-action:manipulation}
        .new-messages-btn:active{transform:scale(.92)}
        .new-messages-btn .count{background:rgba(255,255,255,.2);border-radius:50%;padding:0 8px;font-size:12px}
        .typing-indicator{padding:6px 18px;font-size:13px;color:var(--text-secondary);font-style:italic;min-height:28px;display:flex;align-items:center;gap:6px;flex-shrink:0;background:var(--bg-primary);border-top:1px solid var(--border-color);transition:background .3s}
        .typing-indicator .dots{display:inline-flex;gap:3px}
        .typing-indicator .dots span{width:5px;height:5px;background:var(--text-secondary);border-radius:50%;animation:typingDot 1.4s infinite}
        .typing-indicator .dots span:nth-child(2){animation-delay:.2s}
        .typing-indicator .dots span:nth-child(3){animation-delay:.4s}
        @keyframes typingDot{0%,60%,100%{transform:translateY(0);opacity:.3}30%{transform:translateY(-6px);opacity:1}}
        @media(max-width:768px){.contact-panel{position:fixed;left:0;top:0;width:85%;max-width:320px;height:100%;transform:translateX(-100%);z-index:100;border-right:1px solid var(--border-color)}
        .contact-panel.open{transform:translateX(0)}
        .contact-panel .header .mobile-back-btn{display:block}
        .chat-panel{width:100%}
        .chat-header .mobile-back{display:block}
        .contact-panel-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99}
        .contact-panel-overlay.active{display:block}
        .messages-area{padding:10px 14px}
        .message-row{max-width:90%}
        .input-area{padding:6px 10px;gap:4px}
        .input-area .recipient input{width:50px;font-size:12px;padding:4px 8px}
        .input-area .recipient span{display:none}
        .input-area .message-input{font-size:14px;padding:8px 12px;min-width:50px}
        .input-area .send-btn{padding:8px 14px;font-size:13px}
        .input-area .file-btn{font-size:20px;padding:6px}}
        @media(max-width:400px){.contact-panel{width:100%;max-width:none}
        .input-area .recipient input{width:40px}
        .input-area .message-input{font-size:13px;padding:6px 10px}
        .input-area .send-btn{padding:6px 12px;font-size:12px}}
    </style>
</head>
<body>
    <div class="chat-app">
        <div class="contact-panel-overlay" id="contactPanelOverlay"></div>
        <div class="contact-panel" id="contactPanel">
            <div class="header">
                <button class="mobile-back-btn" id="mobileBackBtn">✕</button>
                <span class="title">Чаты <span class="username" id="headerUsername">—</span></span>
                <div class="profile-icon" id="myAvatar">Г</div>
            </div>
            <div class="login-area" id="loginArea">

        // ============================================================

        // ============================================================
        async function uploadToTmpFiles(file) {
            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('https://tmpfiles.org/api/v1/upload', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    throw new Error('Ошибка загрузки: ' + response.status);
                }

                const data = await response.json();

                if (!data.status || data.status !== 'success') {
                    throw new Error('Ошибка: ' + (data.message || 'Неизвестная ошибка'));
                }

                // Получаем прямую ссылку на скачивание
                const directLink = data.data.url;
                return {
                    directLink: directLink,
                    fileName: file.name,
                    fileSize: file.size
                };
            } catch (err) {
                console.error('Upload error:', err);
                throw err;
            }
        }

        function downloadFile(url, fileName) {
            if (!url) { alert('Ссылка на файл не найдена'); return; }
            const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
            if (isMobile) {
                window.open(url, '_blank');
            } else {
                fetch(url)
                    .then(r => { if (!r.ok) throw new Error('Ошибка'); return r.blob(); })
                    .then(blob => {
                        const blobUrl = URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = blobUrl;
                        link.download = fileName || 'file';
                        document.body.appendChild(link);
                        link.click();
                        document.body.removeChild(link);
                        setTimeout(() => URL.revokeObjectURL(blobUrl), 5000);
                    })
                    .catch(() => { window.open(url, '_blank'); });
            }
        }

                    messagesCache.forEach(item => {

                    delete contacts[id];
                    unreadCounts[id] = 0;
                    renderContacts();
                    if (currentContact === id) switchContact('all');
                }

        }

        function switchContact(id) {
            currentContact = id;
            const displayName = id === 'all' ? 'Общий чат' : id;
            chatHeaderName.textContent = displayName;
            if (id === 'all') {
                chatHeaderAvatar.innerHTML = '👤';
                chatHeaderStatus.textContent = 'онлайн';
                recipientInput.value = '';
            } else {
                chatHeaderAvatar.innerHTML = '';
                const avatarEl = createAvatarElement(displayName, contacts[id]?.avatar, 34);
                chatHeaderAvatar.appendChild(avatarEl);
                chatHeaderStatus.textContent = 'онлайн';
                recipientInput.value = id;
            }
            messagesDiv.innerHTML = '';
            messageNodes = {};
            messagesCache = [];
            messagesRef.off();
            messageListenerStarted = false;
            listenMessages();
            clearTypingListeners();
            setupTypingListener();
        }

        // ============================================================
        // СТАТУСЫ
        // ============================================================
        function getStatusHTML(status) {
            switch (status) {
                case 'sending':
                    return '<span class="check sending">✓</span>';
                case 'sent':
                    return '<span class="check">✓</span><span class="check">✓</span>';
                case 'delivered':
                    return '<span class="check delivered">✓</span><span class="check delivered">✓</span>';
                case 'read':
                    return '<span class="check read">✓</span><span class="check read">✓</span>';
                default:
                    return '';
            }
        }

        function updateMessageStatus(key, status) {
            messageStatuses[key] = status;
            const node = messageNodes[key];
            if (!node) return;
            const statusEl = node.querySelector('.message-status');
            if (statusEl) { statusEl.innerHTML = getStatusHTML(status); }
            const msg = messagesCache.find(m => m.key === key);
            if (msg) msg.status = status;
        }

        function markAsRead(key) {
            const msg = messagesCache.find(m => m.key === key);
            if (!msg) return;
            if (msg.name === currentName) { if (msg.status !== 'read') { messagesRef.child(key).update({ status: 'read' }); } }
            else { messagesRef.child(key).update({ status: 'read' }); }
        }

        // ============================================================
        // ФАЙЛЫ (TMPFILES.ORG)
        // ============================================================
        function shareFile(file) {
            if (!currentUser) { alert('Войдите в систему'); return; }
            const to = recipientInput.value.trim() || null;
            addSystemMessage('📤 Загружаем файл "' + file.name + '" на tmpfiles.org...');
            fileBtn.style.opacity = '0.5';
            fileBtn.disabled = true;
            uploadToTmpFiles(file)
                .then((result) => {
                    addSystemMessage('✅ Файл загружен на tmpfiles.org!');
                    const payload = {
                        name: currentName,
                        text: result.directLink,
                        fileName: result.fileName,
                        fileSize: result.fileSize,
                        isFile: true,
                        to: to,
                        timestamp: firebase.database.ServerValue.TIMESTAMP,
                        status: 'sending'
                    };
                    messagesRef.push(payload);
                    addSystemMessage('📎 Ссылка на файл отправлена в чат!');
                    fileBtn.style.opacity = '1';
                    fileBtn.disabled = false;
                })
                .catch((err) => {
                    addSystemMessage('❌ Ошибка загрузки: ' + err.message);
                    fileBtn.style.opacity = '1';
                    fileBtn.disabled = false;
                });
        }

        function addSystemMessage(text) {
            const div = document.createElement('div');
            div.className = 'message-row system';
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.textContent = text;
            div.appendChild(bubble);
            messagesDiv.appendChild(div);
            if (isAtBottom) messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        fileBtn.addEventListener('click', () => { if (!currentUser) { alert('Войдите в систему'); return; }
            fileInput.click(); });
        fileInput.onchange = (e) => {
            if (e.target.files.length) {
                const file = e.target.files[0];
                if (file.size > 100 * 1024 * 1024) {
                    alert('Файл слишком большой (максимум 100MB для tmpfiles.org)');
                    fileInput.value = '';
                    return;
                }
                shareFile(file);
                fileInput.value = '';
            }
        };

        // ============================================================
        // ПЕЧАТЬ
        // ============================================================
        function setupTypingListener() {
            if (!currentName) return;
            const safeName = sanitizeKey(currentName);
            const safeContact = currentContact === 'all' ? 'all' : sanitizeKey(currentContact);
            typingRef.child(safeContact).on('value', (snapshot) => {
                const data = snapshot.val() || {};
                const typingUsers = Object.keys(data).filter(name => name !== safeName);
                if (typingUsers.length > 0) {
                    let display = '';
                    if (typingUsers.length === 1) { display = typingUsers[0] + ' печатает...'; } else if (
                        typingUsers.length === 2) { display = typingUsers[0] + ' и ' + typingUsers[1] +
                            ' печатают...'; } else { display = typingUsers.length + ' человек печатают...'; }
                    typingNames.textContent = display;
                    typingIndicator.style.display = 'flex';
                } else { typingIndicator.style.display = 'none'; }
            });
        }

        function clearTypingListeners() {
            const safeContact = currentContact === 'all' ? 'all' : sanitizeKey(currentContact);
            typingRef.child(safeContact).off();
        }

        function sendTypingStatus() {
            if (!currentName || !currentUser) return;
            const safeName = sanitizeKey(currentName);
            const safeContact = currentContact === 'all' ? 'all' : sanitizeKey(currentContact);
            typingRef.child(safeContact).child(safeName).set(true);
            if (typingTimeout) clearTimeout(typingTimeout);
            typingTimeout = setTimeout(() => {
                typingRef.child(safeContact).child(safeName).remove();
            }, 3000);
        }

        let typingThrottle = null;
        input.addEventListener('input', () => {
            if (input.value.trim()) {
                if (!typingThrottle) { sendTypingStatus();
                    typingThrottle = setTimeout(() => { typingThrottle = null; }, 2000); }
            }
        });

        function clearTypingStatus() {
            if (!currentName) return;
            const safeName = sanitizeKey(currentName);
            const safeContact = currentContact === 'all' ? 'all' : sanitizeKey(currentContact);
            typingRef.child(safeContact).child(safeName).remove();
            if (typingTimeout) { clearTimeout(typingTimeout);
                typingTimeout = null; }
        }

        // ============================================================
        // СООБЩЕНИЯ
        // ============================================================
        function listenMessages() {
            if (!currentName) return;
            if (messageListenerStarted) return;
            messageListenerStarted = true;
            messagesDiv.innerHTML = '';
            messageNodes = {};
            messagesCache = [];
            messageStatuses = {};
            messagesRef.limitToLast(100).once('value', (snapshot) => {
                const items = [];
                snapshot.forEach((childSnapshot) => { items.push({ key: childSnapshot.key, ...childSnapshot
                        .val() }); });
                items.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                items.forEach(item => { if (!messageNodes[item.key]) { addMessageToUI(item.key, item); } });
                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                isAtBottom = true;
                markAllAsRead();
            });
            messagesRef.limitToLast(1).on('child_added', (snapshot) => {
                const data = snapshot.val();
                const key = snapshot.key;
                if (messagesCache.some(m => m.key === key) || messageNodes[key]) { return; }
                addMessageToUI(key, data);
                if (!isAtBottom && data.name !== currentName) { newMessagesCountVal++;
                    updateNewMessagesBtn(); }
                if (data.name !== currentName && (data.to === currentName || !data.to)) {
                    markAsRead(key);
                    playNotification();
                    if (document.hidden || document.visibilityState === 'hidden') {
                        unreadTotal++;
                        updateUnreadBadge(unreadTotal);
                    }
                    if (notificationsEnabled) {
                        const title = '📩 ' + (data.name || 'Аноним');
                        let body = data.text || '';
                        if (data.isFile) body = '📎 Файл';
                        if (!body) body = 'Новое сообщение';
                        showNotification(title, body);
                    }
                }
            });
            messagesRef.on('child_changed', (snapshot) => {
                const data = snapshot.val();
                const key = snapshot.key;
                const existing = messagesCache.find(m => m.key === key);
                if (existing) {
                    const oldStatus = existing.status;
                    Object.assign(existing, data);
                    const node = messageNodes[key];
                    if (node) {
                        const newRow = createMessageRow(key, data);
                        node.parentNode.replaceChild(newRow, node);
                        messageNodes[key] = newRow;
                    }
                    if (data.status && data.status !== oldStatus) { updateMessageStatus(key, data.status); }
                }
            });
            messagesRef.on('child_removed', (snapshot) => {
                const key = snapshot.key;
                const node = messageNodes[key];
                if (node) { node.remove();
                    delete messageNodes[key]; }
                const idx = messagesCache.findIndex(m => m.key === key);
                if (idx !== -1) messagesCache.splice(idx, 1);
                updateContactsFromCache();
            });
            setupTypingListener();
        }

        function isMessageRelevant(data) {
            if (currentContact === 'all') {
                if (data.to && data.to !== currentName) return false;
                return true;
            } else {
                const isFromMe = data.name === currentName;
                const isFromContact = data.name === currentContact;
                const isToMe = data.to === currentName;
                const isToContact = data.to === currentContact;
                if (isFromMe && isToContact) return true;
                if (isFromContact && isToMe) return true;
                if (isFromMe && !data.to) return false;
                if (isFromContact && !data.to) return false;
                return false;
            }
        }

        function addMessageToUI(key, data) {
            if (messagesCache.some(m => m.key === key) || messageNodes[key]) { return; }
            if (!isMessageRelevant(data)) {
                if (data.name !== currentName) {
                    const contactId = data.to && data.to !== currentName ? data.to : data.name;
                    if (contactId && contactId !== 'all') {
                        if (!unreadCounts[contactId]) unreadCounts[contactId] = 0;
                        if (currentContact !== contactId && data.to !== currentName) {
                            unreadCounts[contactId]++;
                            renderContacts();
                            if (document.hidden || document.visibilityState === 'hidden') {
                                unreadTotal++;
                                updateUnreadBadge(unreadTotal);
                            }
                        }
                        if (!contacts[contactId]) contacts[contactId] = {};
                        contacts[contactId].lastMsg = data.text || (data.isFile ? '📎 Файл' : '');
                        contacts[contactId].timestamp = data.timestamp || 0;
                        renderContacts();
                    }
                }
                return;
            }
            if (!data.status) data.status = 'sending';
            messagesCache.push({ key, ...data });
            messageStatuses[key] = data.status;
            const row = createMessageRow(key, data);
            messagesDiv.appendChild(row);
            messageNodes[key] = row;
            if (isAtBottom) messagesDiv.scrollTop = messagesDiv.scrollHeight;
            updateContactsFromCache();
            if (data.name === currentName && data.status === 'sending') {
                setTimeout(() => {
                    updateMessageStatus(key, 'sent');
                    messagesRef.child(key).update({ status: 'sent' });
                }, 500);
            }
        }

        function createMessageRow(key, data) {
            const row = document.createElement('div');
            row.className = 'message-row' + (data.name === currentName ? ' mine' : '');
            row.dataset.key = key;
            const avatarUrl = (data.name && contacts[data.name]?.avatar) ? contacts[data.name].avatar : null;
            const avatar = createAvatarElement(data.name || '?', avatarUrl, 30);
            avatar.addEventListener('click', () => {
                if (data.name && data.name !== currentName && !contactListArray.includes(data.name)) {
                    if (confirm('Добавить ' + data.name + ' в контакты?')) addContact(data.name); }
            });
            row.appendChild(avatar);
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            const sender = document.createElement('div');
            sender.className = 'sender';
            let senderText = data.name || 'Аноним';
            if (data.to && data.to !== currentName && data.name === currentName) senderText += ' ➔ ' + data.to;
            if (data.to && data.to === currentName && data.name !== currentName) senderText += ' (личное)';
            if (data.edited) senderText += ' (ред.)';
            sender.textContent = senderText;
            bubble.appendChild(sender);
            const textDiv = document.createElement('div');
            textDiv.className = 'text';
            if (data.isFile && data.text) {
                const downloadBtn = document.createElement('button');
                downloadBtn.className = 'file-link';
                downloadBtn.textContent = '📥 Скачать "' + (data.fileName || 'файл') + '"';
                downloadBtn.onclick = (e) => {
                    e.stopPropagation();
                    downloadFile(data.text, data.fileName || 'file');
                };
                textDiv.appendChild(downloadBtn);
                if (data.fileSize) {
                    const info = document.createElement('div');
                    info.className = 'file-info';
                    info.textContent = 'Размер: ' + (data.fileSize / 1024 / 1024).toFixed(2) + ' MB';
                    textDiv.appendChild(info);
                }
                const copyBtn = document.createElement('button');
                copyBtn.className = 'copy-btn';
                copyBtn.textContent = '📋 Копировать ссылку';
                copyBtn.onclick = (e) => {
                    e.stopPropagation();
                    navigator.clipboard.writeText(data.text).then(() => { alert('Ссылка скопирована!'); })
                    .catch(() => {
                        const textarea = document.createElement('textarea');
                        textarea.value = data.text;
                        document.body.appendChild(textarea);
                        textarea.select();
                        document.execCommand('copy');
                        document.body.removeChild(textarea);
                        alert('Ссылка скопирована!');
                    });
                };
                textDiv.appendChild(copyBtn);
            } else if (data.text) {
                const lines = data.text.split('\n');
                lines.forEach((line, i) => {
                    if (i > 0) textDiv.appendChild(document.createElement('br'));
                    const p = document.createElement('span');
                    p.textContent = line;
                    textDiv.appendChild(p);
                });
            }
            bubble.appendChild(textDiv);
            const timeStatusWrap = document.createElement('div');
            timeStatusWrap.className = 'time-status-wrap';
            const time = document.createElement('div');
            time.className = 'time';
            const ts = data.timestamp ? new Date(data.timestamp).toLocaleTimeString() : '';
            time.textContent = ts;
            timeStatusWrap.appendChild(time);
            if (data.name === currentName) {
                const statusSpan = document.createElement('span');
                statusSpan.className = 'message-status';
                const status = data.status || 'sent';
                statusSpan.innerHTML = getStatusHTML(status);
                timeStatusWrap.appendChild(statusSpan);
            }
            bubble.appendChild(timeStatusWrap);
            row.appendChild(bubble);
            row.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                e.stopPropagation();
                if (window.innerWidth <= 768) { showBottomSheet(key, data); } else { showContextMenu(e, key,
                        data); }
            });
            row.addEventListener('touchstart', (e) => {
                if (e.target.closest('.reaction')) return;
                const touch = e.touches[0];
                longPressTimer = setTimeout(() => {
                    if (window.innerWidth <= 768) { showBottomSheet(key, data); } else { showContextMenu({
                            clientX: touch.clientX,
                            clientY: touch.clientY,
                            preventDefault: () => {}
                        }, key, data); }
                }, 500);
            }, { passive: true });
            row.addEventListener('touchend', () => clearTimeout(longPressTimer), { passive: true });
            row.addEventListener('touchmove', () => clearTimeout(longPressTimer), { passive: true });
            return row;
        }
        let longPressTimer = null;

        // ============================================================
        // КОНТЕКСТНОЕ МЕНЮ
        // ============================================================
        function showContextMenu(e, key, data) {
            e.preventDefault();
            e.stopPropagation();
            contextTarget = key;
            contextMenu.innerHTML = '';
            contextMenu.style.display = 'block';
            const actions = [
                { action: 'reply', label: '↩️ Ответить' },
                { action: 'quote', label: '📝 Цитировать' },
                { action: 'reactions', label: '😊 Реакции', submenu: true },
                { action: 'forward', label: '↪️ Переслать' }
            ];
            if (data.name === currentName) {
                actions.push({ action: 'edit', label: '✏️ Редактировать' });
                actions.push({ action: 'delete', label: '🗑 Удалить' });
            }
            if (data.name && data.name !== currentName && !contactListArray.includes(data.name)) {
                actions.push({ action: 'addcontact', label: '➕ Добавить контакт' });
            }
            actions.forEach(item => {
                const btn = document.createElement('button');
                btn.textContent = item.label;
                btn.dataset.action = item.action;
                if (item.submenu) btn.classList.add('has-submenu');
                contextMenu.appendChild(btn);
                if (item.submenu) {
                    const submenu = document.createElement('div');
                    submenu.className = 'submenu';
                    const reactionEmojis = ['❤️', '😂', '😮', '😢', '🔥'];
                    reactionEmojis.forEach(emoji => {
                        const subBtn = document.createElement('button');
                        subBtn.textContent = emoji;
                        subBtn.dataset.action = 'react_' + emoji;
                        submenu.appendChild(subBtn);
                    });
                    contextMenu.appendChild(submenu);
                    btn.addEventListener('mouseenter', () => {
                        document.querySelectorAll('.submenu').forEach(el => el.classList.remove(
                        'active'));
                        submenu.classList.add('active');
                        const rect = btn.getBoundingClientRect();
                        submenu.style.left = (rect.width) + 'px';
                        submenu.style.top = '0';
                    });
                    btn.addEventListener('mouseleave', () => {
                        setTimeout(() => { if (!submenu.matches(':hover')) submenu.classList.remove(
                                'active'); }, 200);
                    });
                    submenu.addEventListener('mouseleave', () => { submenu.classList.remove('active'); });
                    submenu.querySelectorAll('button').forEach(subBtn => {
                        subBtn.addEventListener('click', (e) => {
                            e.stopPropagation();
                            const emoji = subBtn.dataset.action.replace('react_', '');
                            toggleReaction(key, emoji);
                            contextMenu.style.display = 'none';
                        });
                    });
                }
            });
            contextMenu.querySelectorAll('button:not(.has-submenu)').forEach(btn => {
                btn.addEventListener('click', () => {
                    const action = btn.dataset.action;
                    contextMenu.style.display = 'none';
                    handleContextAction(action, key);
                });
            });
            let left = e.clientX || 10;
            let top = e.clientY || 10;
            const menuWidth = 200;
            const menuHeight = actions.length * 44 + 20;
            if (left + menuWidth > window.innerWidth) left = window.innerWidth - menuWidth - 10;
            if (top + menuHeight > window.innerHeight) top = window.innerHeight - menuHeight - 10;
            if (top < 10) top = 10;
            if (left < 10) left = 10;
            contextMenu.style.left = left + 'px';
            contextMenu.style.top = top + 'px';
        }
        let contextTarget = null;

        function hideContextMenu() {
            contextMenu.style.display = 'none';
            document.querySelectorAll('.submenu').forEach(el => el.classList.remove('active'));
            contextTarget = null;
        }
        document.addEventListener('click', (e) => { if (!contextMenu.contains(e.target)) hideContextMenu(); });

        function toggleReaction(key, emoji) {
            const msgData = messagesCache.find(m => m.key === key);
            if (!msgData) return;
            const ref = messagesRef.child(key);
            ref.once('value', (snap) => {
                const data = snap.val() || {};
                if (!data.reactions) data.reactions = {};
                const usersKey = emoji + '_users';
                if (!data.reactions[usersKey]) data.reactions[usersKey] = [];
                const idx = data.reactions[usersKey].indexOf(currentName);
                if (idx !== -1) {
                    data.reactions[usersKey].splice(idx, 1);
                    data.reactions[emoji] = (data.reactions[emoji] || 1) - 1;
                    if (data.reactions[emoji] <= 0) {
                        delete data.reactions[emoji];
                        delete data.reactions[usersKey];
                    }
                } else {
                    data.reactions[usersKey].push(currentName);
                    data.reactions[emoji] = (data.reactions[emoji] || 0) + 1;
                }
                ref.update({ reactions: data.reactions });
            });
        }

        function handleContextAction(action, key) {
            const msgData = messagesCache.find(m => m.key === key);
            if (!msgData) return;
            switch (action) {
                case 'reply':
                    const quote = msgData.text || '';
                    input.value = '> ' + msgData.name + ': ' + quote + '\n';
                    input.focus();
                    break;
                case 'quote':
                    const qText = msgData.text || '';
                    input.value = '> ' + msgData.name + ': ' + qText + '\n\n';
                    input.focus();
                    break;
                case 'edit':
                    if (msgData.name !== currentName) { alert('Редактировать можно только свои сообщения.');
                        return; }
                    const newText = prompt('Редактировать:', msgData.text);
                    if (newText !== null && newText.trim() !== '') { messagesRef.child(key).update({ text: newText
                                .trim(), edited: true }); }
                    break;
                case 'delete':
                    if (msgData.name !== currentName) { alert('Удалять можно только свои сообщения.');
                        return; }
                    if (confirm('Удалить сообщение?')) messagesRef.child(key).remove();
                    break;
                case 'forward':
                    const fwd = prompt('Кому отправить (или пусто для общего):');
                    if (fwd !== null) {
                        const payload = {
                            name: currentName,
                            text: msgData.text || '',
                            to: fwd.trim() || null,
                            timestamp: firebase.database.ServerValue.TIMESTAMP,
                            forwarded: true,
                            originalSender: msgData.name
                        };
                        messagesRef.push(payload);
                    }
                    break;
                case 'addcontact':
                    const name = msgData.name;
                    if (name && !contactListArray.includes(name)) addContact(name);
                    break;
            }
        }

        // ============================================================
        // BOTTOM SHEET
        // ============================================================
        function showBottomSheet(key, data) {
            contextTarget = key;
            bottomSheetContent.innerHTML = '';
            const actions = [
                { action: 'reply', label: '↩️ Ответить' },
                { action: 'quote', label: '📝 Цитировать' },
                { action: 'forward', label: '↪️ Переслать' }
            ];
            if (data.name === currentName) {
                actions.push({ action: 'edit', label: '✏️ Редактировать' });
                actions.push({ action: 'delete', label: '🗑 Удалить' });
            }
            const reactionEmojis = ['❤️', '😂', '😮', '😢', '🔥'];
            const reactionRow = document.createElement('div');
            reactionRow.style.cssText =
                'display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--border-color);';
            reactionEmojis.forEach(emoji => {
                const btn = document.createElement('button');
                btn.textContent = emoji;
                btn.style.cssText =
                    'font-size:28px;flex:1;text-align:center;padding:8px;background:none;border:none;cursor:pointer;';
                btn.onclick = () => { toggleReaction(key, emoji);
                    hideBottomSheet(); };
                reactionRow.appendChild(btn);
            });
            bottomSheetContent.appendChild(reactionRow);
            actions.forEach(item => {
                const btn = document.createElement('button');
                btn.textContent = item.label;
                btn.dataset.action = item.action;
                btn.onclick = () => { hideBottomSheet();
                    handleContextAction(item.action, key); };
                bottomSheetContent.appendChild(btn);
            });
            bottomSheet.classList.add('active');

        function hideBottomSheet() {
            bottomSheet.classList.remove('active');
            bottomSheetOverlay.classList.remove('active');
            document.body.style.overflow = '';
            contextTarget = null;
        }
        bottomSheetCancel.addEventListener('click', hideBottomSheet);
        bottomSheetOverlay.addEventListener('click', hideBottomSheet);

        // ============================================================
        // ОБНОВЛЕНИЕ КОНТАКТОВ
        // ============================================================
        function updateContactsFromCache() {
            const newContacts = {};
            messagesCache.forEach(item => {
                const contactId = item.to && item.to !== currentName ? item.to : (item.name !== currentName ? item
                    .name : null);
                if (contactId) {
                    if (!newContacts[contactId]) newContacts[contactId] = { lastMsg: '', time: '',
                        timestamp: 0 };
                    newContacts[contactId].lastMsg = item.text || (item.isFile ? '📎 Файл' : '');
                    const ts = item.timestamp || 0;
                    newContacts[contactId].time = ts ? new Date(ts).toLocaleTimeString() : '';
                    newContacts[contactId].timestamp = ts;
                }
                if (!item.to) {
                    if (!newContacts['all']) newContacts['all'] = { lastMsg: '', time: '', timestamp: 0 };
                    newContacts['all'].lastMsg = item.text || (item.isFile ? '📎 Файл' : '');
                    const ts = item.timestamp || 0;
                    newContacts['all'].time = ts ? new Date(ts).toLocaleTimeString() : '';
                    newContacts['all'].timestamp = ts;
                }
            });
            const contactNames = Object.keys(newContacts).filter(c => c !== 'all');
            if (contactNames.length) {
                const promises = contactNames.map(name => {
                    return usersRef.orderByChild('name').equalTo(name).once('value').then(snap => {
                        snap.forEach(childSnap => {
                            const data = childSnap.val();
                            if (data.avatar) {
                                if (!newContacts[name]) newContacts[name] = {};
                                newContacts[name].avatar = data.avatar;
                            }
                        });
                    }).catch(() => {});
                });
                Promise.all(promises).then(() => {
                    contacts = newContacts;
                    renderContacts();
                });
            } else {
                contacts = newContacts;
                renderContacts();
            }
        }

        // ============================================================
        // ОТПРАВКА
        // ============================================================
        function sendMessage(text) {
            if (!currentUser || !currentName) return;
            const to = recipientInput.value.trim() || null;
            const payload = {
                name: currentName,
                text: text || '',
                to: to,
                timestamp: firebase.database.ServerValue.TIMESTAMP,
                status: 'sending'
            };
            messagesRef.push(payload);
            clearTypingStatus();
            if (to) chatHeaderName.textContent = to;
            else chatHeaderName.textContent = 'Общий чат';
        }

        function sendText() {
            const text = input.value.trim();
            if (!text) return;
            sendMessage(text);
            input.value = '';
        }
        sendBtn.onclick = sendText;
        input.onkeydown = (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault();
                sendText(); }
            if (e.key === 'Enter' && e.ctrlKey) {
                e.preventDefault();
                const start = input.selectionStart;
                const end = input.selectionEnd;
                input.value = input.value.substring(0, start) + '\n' + input.value.substring(end);
                input.selectionStart = input.selectionEnd = start + 1;
            }
        };

        // ============================================================
        // ПОМЕТКА ВСЕХ КАК ПРОЧИТАННЫХ
        // ============================================================
        function markAllAsRead() {
            messagesCache.forEach(msg => {
                if (msg.name !== currentName && (msg.to === currentName || !msg.to)) {
                    if (msg.status !== 'read') { markAsRead(msg.key); }
                }
            });
        }

        // ============================================================
        // НОВЫЕ СООБЩЕНИЯ
        // ============================================================
        function updateNewMessagesBtn() {
            if (newMessagesCountVal > 0 && !isAtBottom) {
                newMessagesBtn.style.display = 'flex';
                newMessagesCount.textContent = newMessagesCountVal;
            } else { newMessagesBtn.style.display = 'none'; }
        }
        newMessagesBtn.addEventListener('click', () => {
            messagesDiv.scrollTo({ top: messagesDiv.scrollHeight, behavior: 'smooth' });
            newMessagesCountVal = 0;
            updateNewMessagesBtn();
            isAtBottom = true;
            markAllAsRead();
        });
        messagesDiv.addEventListener('scroll', () => {
            const threshold = 100;
            const atBottom = messagesDiv.scrollHeight - messagesDiv.scrollTop - messagesDiv.clientHeight < threshold;
            if (atBottom) { isAtBottom = true;
                newMessagesCountVal = 0;
                updateNewMessagesBtn();
                markAllAsRead(); } else { isAtBottom = false; }
        });

        // ============================================================
        // ЗВУК
        // ============================================================
        function playNotification() {
            if (!isSoundEnabled || !audioCtx) return;
            try {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = 800;
                gain.gain.value = 0.12;
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.12);
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.12);
            } catch (e) {}
        }

        function initAudioOnInteraction() {
            const init = () => {
                if (!audioCtx) {
                    try {
                        audioCtx = new(window.AudioContext || window.webkitAudioContext)();
                        if (audioCtx.state === 'suspended') audioCtx.resume();
                        isSoundEnabled = true;
                    } catch (e) { isSoundEnabled = false; }
                }
            };
            document.addEventListener('touchstart', init, { once: true });
            document.addEventListener('click', init, { once: true });
            input.addEventListener('focus', init, { once: true });
            sendBtn.addEventListener('click', init, { once: true });
        }

        // ============================================================
        // ПРОВЕРКА
        // ============================================================
        function checkConnection() {
            statusDiv.textContent = '⏳ Проверка...';
            const connectedRef = db.ref('.info/connected');
            connectedRef.once('value', (snap) => {
                const connected = snap.val();
                if (connected === true) {
                    statusDiv.textContent = '✅ Соединение с Firebase есть';
                    statusDiv.className = 'status-bar';
                } else {
                    statusDiv.textContent = '⚠️ Нет соединения с Firebase';
                    statusDiv.className = 'status-bar warning';
                }
            }).catch((err) => {
                statusDiv.textContent = '❌ Ошибка: ' + err.message;
                statusDiv.className = 'status-bar error';
            });
        }

        // ============================================================
        // АУТЕНТИФИКАЦИЯ
        // ============================================================
        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                usersRef.child(user.uid).once('value').then(snap => {
                    const data = snap.val();
                    let name = data?.name;
                    if (!name || name.startsWith('Гость')) {
                        if (user.email) name = user.email.split('@')[0];
                        else name = 'Гость' + Math.floor(Math.random() * 10000);
                        usersRef.child(user.uid).update({ name });
                    }
                    currentName = name;
                    updateHeaderUsername(currentName);
                    updateHeaderAvatar();
                    loginArea.querySelectorAll('input').forEach(el => el.style.display = 'none');
                    loginArea.querySelectorAll('.auth-buttons').forEach(el => el.style.display = 'none');
                    const pwWrapper = loginArea.querySelector('.password-wrapper');
                    if (pwWrapper) pwWrapper.style.display = 'none';
                    logoutBtn.style.display = 'inline-block';
                    contactTools.style.display = 'flex';
                    input.disabled = false;
                    sendBtn.disabled = false;
                    statusDiv.textContent = '✅ Подключено';
                    statusDiv.className = 'status-bar';
                    loadContacts();
                    switchContact('all');
                    checkConnection();
                    initAudioOnInteraction();
                    stopBlinking();
                    unreadTotal = 0;
                    updateUnreadBadge(0);
                    messageListenerStarted = false;
                    listenMessages();
                    setupOnlineStatus();
                    onlineRef.on('value', () => { updateOnlineDots(); });
                });
            } else {
                if (onlineInterval) { clearInterval(onlineInterval);
                    onlineInterval = null; }
                const safeName = sanitizeKey(currentName);
                if (safeName) onlineRef.child(safeName).remove();

                currentUser = null;
                currentName = '';
                updateHeaderUsername('');
                loginArea.querySelectorAll('input').forEach(el => el.style.display = '');
                loginArea.querySelectorAll('.auth-buttons').forEach(el => el.style.display = '');
                const wrapper = loginArea.querySelector('.password-wrapper');
                if (!wrapper) {
                    const w = document.createElement('div');
                    w.className = 'password-wrapper';
                    w.appendChild(passwordInput);
                    w.appendChild(togglePasswordBtn);
                    loginArea.insertBefore(w, loginArea.querySelector('.auth-buttons'));
                } else { wrapper.style.display = ''; }
                logoutBtn.style.display = 'none';
                contactTools.style.display = 'none';
                input.disabled = true;
                sendBtn.disabled = true;
                statusDiv.textContent = '⏳ Войдите или зарегистрируйтесь';
                messagesDiv.innerHTML = '';
                contactList.innerHTML = '';
                messagesRef.off();
                messageListenerStarted = false;
                contacts = {};
                contactListArray = [];
                unreadCounts = {};
                unreadTotal = 0;
                stopBlinking();
                clearTypingListeners();
                typingIndicator.style.display = 'none';
            }
        });

        registerBtn.onclick = () => {
            const email = emailInput.value.trim();
            const pass = passwordInput.value.trim();
            if (!email || !pass) { alert('Введите email и пароль'); return; }
            auth.createUserWithEmailAndPassword(email, pass)
                .then((cred) => { const name = email.split('@')[0]; return usersRef.child(cred.user.uid).set({ name }); })
                .then(() => alert('Регистрация успешна!'))
                .catch(err => alert('Ошибка: ' + err.message));
        };

        loginBtn.onclick = () => {
            const email = emailInput.value.trim();
            const pass = passwordInput.value.trim();
            if (!email || !pass) { alert('Введите email и пароль'); return; }
            auth.signInWithEmailAndPassword(email, pass)
                .then(() => alert('Добро пожаловать!'))
                .catch(err => alert('Ошибка: ' + err.message));
        };

        logoutBtn.onclick = () => { auth.signOut(); };

        addContactBtn.onclick = () => {
            const name = prompt('Введите имя пользователя для добавления в контакты:');
            if (name && name.trim()) {
                const trimmed = name.trim();
                if (trimmed === currentName) { alert('Нельзя добавить самого себя.'); return; }
                addContact(trimmed);
            }
        };

        recipientInput.oninput = () => {
            const to = recipientInput.value.trim();
            if (to) {
                currentContact = to;
                chatHeaderName.textContent = to;
                chatHeaderAvatar.innerHTML = '';
                const avatarEl = createAvatarElement(to, contacts[to]?.avatar, 34);
                chatHeaderAvatar.appendChild(avatarEl);
                chatHeaderStatus.textContent = 'онлайн';
            } else {
                currentContact = 'all';
                chatHeaderName.textContent = 'Общий чат';
                chatHeaderAvatar.innerHTML = '👤';
                chatHeaderStatus.textContent = 'онлайн';
            }
            messagesDiv.innerHTML = '';
            messageNodes = {};
            messagesCache = [];
            messagesRef.off();
            messageListenerStarted = false;
            listenMessages();
            clearTypingListeners();
            setupTypingListener();
        };

        recipientInput.addEventListener('focus', () => {
            const dropdown = document.getElementById('contactDropdown');
            dropdown.innerHTML = '';
            const allContacts = new Set(contactListArray);
            Object.keys(contacts).forEach(c => { if (c !== 'all') allContacts.add(c); });
            const sorted = Array.from(allContacts).sort();
            if (sorted.length === 0) {
                const div = document.createElement('div');
                div.textContent = 'Нет контактов';
                dropdown.appendChild(div);
            } else {
                sorted.forEach(name => {
                    const div = document.createElement('div');
                    div.textContent = name;
                    div.onclick = () => { recipientInput.value = name;
                        dropdown.classList.remove('active');
                        switchContact(name); };
                    dropdown.appendChild(div);
                });
            }
            dropdown.classList.add('active');
        });

        recipientInput.addEventListener('blur', () => {
            setTimeout(() => { document.getElementById('contactDropdown').classList.remove('active'); }, 200);
        });

        myAvatar.addEventListener('dblclick', () => {
            if (!currentUser) return;
            const newName = prompt('Введите ваше новое имя (будет сохранено):', currentName);
            if (newName && newName.trim()) {
                const newNameTrim = newName.trim();
                usersRef.child(currentUser.uid).update({ name: newNameTrim });
                currentName = newNameTrim;
                updateHeaderUsername(currentName);
                updateHeaderAvatar();
            }
        });

        console.log('🚀 ICQ-чат загружен! tmpfiles.org + статусы сообщений + онлайн статус');
        console.log('📱 Добавьте страницу на рабочий стол через браузер');
    </script>
</body>
</html>
