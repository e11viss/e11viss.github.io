function renderChatList() {
    chatList.innerHTML = '';
    if (!currentUser) {
        for (let i = 0; i < 5; i++) {
            const skeleton = document.createElement('div');
            skeleton.className = 'skeleton-item';
            skeleton.innerHTML = `
                <div class="skeleton-avatar"></div>
                <div>
                    <div class="skeleton-text" style="width:120px;"></div>
                    <div class="skeleton-text short" style="margin-top:6px;"></div>
                </div>
            `;
            chatList.appendChild(skeleton);
        }
        return;
    }
    
    const filtered = getFilteredChats();
    if (filtered.length === 0) {
        const empty = document.createElement('div');
        empty.style.cssText = 'padding:40px 20px;text-align:center;color:var(--text-muted);';
        empty.textContent = '📭 Нет чатов в этой папке';
        chatList.appendChild(empty);
        return;
    }
    
    filtered.forEach(item => {
        const div = createChatItem(item.id, item.name, item.lastMsg, item.time, item.isGroup);
        if (item.isGroup) {
            div.dataset.group = item.id;
            div.dataset.isGroup = 'true';
        }
        chatList.appendChild(div);
    });
    
    document.querySelectorAll('.chat-item').forEach(el => {
        if (el.dataset.contact === currentContact) el.classList.add('active');
    });
    
    setTimeout(updateOnlineDots, 100);
    updateBadge();
}

function createChatItem(id, displayName, lastMsg, time, isGroup = false) {
    const div = document.createElement('div');
    div.className = 'chat-item';
    div.dataset.contact = id;
    if (!isGroup && id !== 'all') div.dataset.userId = id;
    
    let avatarUrl = null;
    let avatarEmoji = null;
    if (isGroup) {
        avatarEmoji = '👥';
    } else if (id !== 'all') {
        avatarUrl = getAvatarUrl(id);
    }
    const avatar = createAvatarElement(displayName, avatarUrl, 44);
    if (id !== 'all' && !isGroup) {
        const dot = document.createElement('span');
        dot.className = 'online-dot';
        avatar.appendChild(dot);
    } else if (isGroup) {
        const icon = document.createElement('span');
        icon.textContent = '👥';
        icon.style.fontSize = '20px';
        avatar.appendChild(icon);
    } else {
        const icon = document.createElement('span');
        icon.textContent = '💬';
        icon.style.fontSize = '20px';
        avatar.appendChild(icon);
    }
    div.appendChild(avatar);
    
    const info = document.createElement('div');
    info.className = 'info';
    const name = document.createElement('div');
    name.className = 'name';
    name.textContent = displayName;
    const msg = document.createElement('div');
    msg.className = 'last-msg';
    msg.textContent = lastMsg;
    info.appendChild(name);
    info.appendChild(msg);
    div.appendChild(info);
    
    const timeEl = document.createElement('div');
    timeEl.className = 'time';
    timeEl.textContent = time;
    div.appendChild(timeEl);
    
    if (id !== 'all' && !isGroup && unreadCounts[id] && unreadCounts[id] > 0) {
        const badge = document.createElement('span');
        badge.className = 'unread-badge';
        badge.textContent = unreadCounts[id];
        div.appendChild(badge);
    }
    
    div.onclick = () => {
        if (isGroup) {
            switchToGroup(id);
        } else if (id !== 'all') {
            unreadCounts[id] = 0;
            renderChatList();
            unreadTotal = 0;
            updateBadge();
            stopBlinking();
            switchContact(id);
        } else {
            switchContact(id);
        }
        if (window.innerWidth <= 768) closeChatList();
    };
    
    div.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        if (id === 'all' || isGroup) return;
        if (confirm('Очистить всю историю с ' + displayName + '?')) {
            const toRemove = [];
            messagesCache.forEach(item => {
                if (item.name === id || item.to === id || (item.name === currentName && item.to === id)) {
                    toRemove.push(item.key);
                }
            });
            toRemove.forEach(key => messagesRef.child(key).remove());
            delete contacts[id];
            unreadCounts[id] = 0;
            renderChatList();
            if (currentContact === id) switchContact('all');
        }
    });
    
    return div;
}

function switchContact(id) {
    currentContact = id;
    currentGroupId = null;
    const displayName = id === 'all' ? 'Общий чат' : id;
    chatHeaderName.textContent = displayName;
    
    chatHeaderAvatar.innerHTML = '';
    if (id === 'all') {
        chatHeaderAvatar.textContent = '💬';
        chatHeaderAvatar.style.background = 'var(--accent)';
        chatHeaderStatus.textContent = 'онлайн';
        chatHeaderStatus.className = 'status';
    } else {
        const avatarUrl = getAvatarUrl(id);
        const avatarEl = createAvatarElement(displayName, avatarUrl, 38);
        chatHeaderAvatar.appendChild(avatarEl);
        chatHeaderStatus.textContent = 'в сети';
        chatHeaderStatus.className = 'status online';
    }
    
    messagesDiv.innerHTML = '';
    messageNodes = {};
    messagesCache = [];
    messagesRef.off();
    messageListenerStarted = false;
    listenMessages();
    clearTypingListeners();
    setupTypingListener();
    renderChatList();
}

function addContact(contactName) {
    if (!contactName || contactName === currentName) return;
    if (contactListArray.includes(contactName)) {
        showToast('Контакт уже есть в списке.');
        return;
    }
    contactListArray.push(contactName);
    saveContacts();
    renderChatList();
    showToast('✅ Контакт добавлен');
}

function removeContact(contactName) {
    if (!contactName) return;
    const idx = contactListArray.indexOf(contactName);
    if (idx !== -1) {
        contactListArray.splice(idx, 1);
        saveContacts();
        renderChatList();
        if (currentContact === contactName) switchContact('all');
        showToast('🗑 Контакт удалён');
    }
}

function saveContacts() {
    if (!currentUser) return;
    const contactsData = {};
    contactListArray.forEach(name => {
        contactsData[sanitizeKey(name)] = true;
    });
    usersRef.child(currentUser.uid + '/contacts').set(contactsData);
}

function loadContacts() {
    if (!currentUser) return;
    usersRef.child(currentUser.uid + '/contacts').once('value').then(snap => {
        const data = snap.val() || {};
        contactListArray = Object.keys(data);
        renderChatList();
    });
}

function updateBadge() {
    let total = 0;
    Object.values(unreadCounts).forEach(c => total += c);
    if (total > 0) {
        tabBadge.style.display = 'flex';
        tabBadge.textContent = total > 99 ? '99+' : total;
    } else {
        tabBadge.style.display = 'none';
    }
}

// СООБЩЕНИЯ
// ============================================================
function listenMessages() {
    if (!currentName || !currentUserId) return;
    if (messageListenerStarted) return;
    messageListenerStarted = true;
    
    messagesDiv.innerHTML = '';
    messageNodes = {};
    messagesCache = [];
    messageStatuses = {};
    lastNotifiedMessageCount = 0;
    
    messagesRef.limitToLast(100).once('value', (snapshot) => {
        const items = [];
        snapshot.forEach((childSnapshot) => {
            items.push({ key: childSnapshot.key, ...childSnapshot.val() });
        });
        items.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
        items.forEach(item => {
            if (!messageNodes[item.key]) addMessageToUI(item.key, item);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
        isAtBottom = true;
        markAllAsRead();
    });
    
    messagesRef.limitToLast(1).on('child_added', (snapshot) => {
        const data = snapshot.val();
        const key = snapshot.key;
        if (messagesCache.some(m => m.key === key) || messageNodes[key]) return;
        
        if (data.name !== currentName && (data.to === currentName || !data.to)) {
            const msgKey = key || Date.now();
            if (msgKey !== lastNotifiedMessageCount) {
                lastNotifiedMessageCount = msgKey;
                const title = '💬 ' + (data.name || 'Аноним');
                let body = data.text || '';
                if (data.isFile) body = '📎 Файл';
                if (data.isVoice) body = '🎤 Голосовое сообщение';
                if (!body) body = 'Новое сообщение';
                showNotification(title, body);
            }
        }
        
        addMessageToUI(key, data);
        if (!isAtBottom && data.name !== currentName) {
            newMessagesCountVal++;
            updateNewMessagesBtn();
        }
        if (data.name !== currentName && (data.to === currentName || !data.to)) {
            markAsRead(key);
            if (document.hidden || document.visibilityState === 'hidden') {
                unreadTotal++;
                updateBadge();
                startBlinking();
            }
        }
        if (data.name !== currentName) {
            lastMessageForReplies = data;
            setTimeout(() => showSmartReplies(data), 500);
        }
    });
    
    messagesRef.on('child_changed', (snapshot) => {
        const data = snapshot.val();
        const key = snapshot.key;
        const existing = messagesCache.find(m => m.key === key);
        if (existing) {
            const oldStatus = existing.status;
            Object.assign(existing, data);
            const node = messageNodes[key];
            if (node) {
                const newRow = createMessageRow(key, data);
                node.parentNode.replaceChild(newRow, node);
                messageNodes[key] = newRow;
            }
            if (data.status && data.status !== oldStatus) updateMessageStatus(key, data.status);
        }
    });
    
    messagesRef.on('child_removed', (snapshot) => {
        const key = snapshot.key;
        const node = messageNodes[key];
        if (node) { node.remove(); delete messageNodes[key]; }
        const idx = messagesCache.findIndex(m => m.key === key);
        if (idx !== -1) messagesCache.splice(idx, 1);
        updateContactsFromCache();
    });
    
    setupTypingListener();
}

function isMessageRelevant(data) {
    if (currentContact === 'all') {
        if (data.to && data.to !== currentName) return false;
        return true;
    } else {
        const isFromMe = data.name === currentName;
        const isFromContact = data.name === currentContact;
        const isToMe = data.to === currentName;
        const isToContact = data.to === currentContact;
        if (isFromMe && isToContact) return true;
        if (isFromContact && isToMe) return true;
        if (isFromMe && !data.to) return false;
        if (isFromContact && !data.to) return false;
        return false;
    }
}

function addMessageToUI(key, data) {
    if (messagesCache.some(m => m.key === key) || messageNodes[key]) return;
    if (!isMessageRelevant(data)) {
        if (data.name !== currentName) {
            const contactId = data.to && data.to !== currentName ? data.to : data.name;
            if (contactId && contactId !== 'all') {
                if (!unreadCounts[contactId]) unreadCounts[contactId] = 0;
                if (currentContact !== contactId && data.to !== currentName) {
                    unreadCounts[contactId]++;
                    renderChatList();
                    if (document.hidden || document.visibilityState === 'hidden') {
                        unreadTotal++;
                        updateBadge();
                    }
                }
                if (!contacts[contactId]) contacts[contactId] = {};
                contacts[contactId].lastMsg = data.text || (data.isFile ? '📎 Файл' : '');
                contacts[contactId].timestamp = data.timestamp || 0;
                contacts[contactId].time = data.timestamp ? formatTime(data.timestamp) : '';
                renderChatList();
            }
        }
        return;
    }
    if (!data.status) data.status = 'sending';
    messagesCache.push({ key, ...data });
    messageStatuses[key] = data.status;
    const row = createMessageRow(key, data);
    messagesDiv.appendChild(row);
    messageNodes[key] = row;
    if (isAtBottom) messagesDiv.scrollTop = messagesDiv.scrollHeight;
    updateContactsFromCache();
    
    if (data.name === currentName && data.status === 'sending') {
        setTimeout(() => {
            updateMessageStatus(key, 'sent');
            messagesRef.child(key).update({ status: 'sent' });
        }, 500);
    }
}

function createMessageRow(key, data) {
    const row = document.createElement('div');
    row.className = 'message-row' + (data.name === currentName ? ' mine' : '');
    row.dataset.key = key;
    
    const avatarUrl = data.name ? getAvatarUrl(data.name) : null;
    const avatar = createAvatarElement(data.name || '?', avatarUrl, 30);
    avatar.addEventListener('click', () => {
        if (data.name && data.name !== currentName && !contactListArray.includes(data.name)) {
            if (confirm('Добавить ' + data.name + ' в контакты?')) addContact(data.name);
        }
    });
    row.appendChild(avatar);
    
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    
    const sender = document.createElement('div');
    sender.className = 'sender';
    let senderText = data.name || 'Аноним';
    if (data.to && data.to !== currentName && data.name === currentName) senderText += ' ➔ ' + data.to;
    if (data.to && data.to === currentName && data.name !== currentName) senderText += ' (личное)';
    if (data.edited) senderText += ' (ред.)';
    if (data.pinned) senderText += ' 📌';
    sender.textContent = senderText;
    bubble.appendChild(sender);
    
    const textDiv = document.createElement('div');
    textDiv.className = 'text';
    
    if (data.isVoice && data.text) {
        textDiv.appendChild(createVoiceMessageElement(data));
    } else if (data.isFile && data.text) {
        const downloadBtn = document.createElement('button');
        downloadBtn.className = 'file-link';
        downloadBtn.textContent = '📥 Скачать "' + (data.fileName || 'файл') + '"';
        downloadBtn.onclick = (e) => { e.stopPropagation(); downloadFile(data.text, data.fileName || 'file'); };
        textDiv.appendChild(downloadBtn);
        if (data.fileSize) {
            const info = document.createElement('div');
            info.className = 'file-info';
            info.textContent = 'Размер: ' + (data.fileSize / 1024 / 1024).toFixed(2) + ' MB';
            textDiv.appendChild(info);
        }
        const copyBtn = document.createElement('button');
        copyBtn.className = 'copy-btn';
        copyBtn.textContent = '📋 Копировать ссылку';
        copyBtn.onclick = (e) => {
            e.stopPropagation();
            navigator.clipboard.writeText(data.text).then(() => alert('Ссылка скопирована!'))
                .catch(() => { const ta = document.createElement('textarea'); ta.value = data.text; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); alert('Ссылка скопирована!'); });
        };
        textDiv.appendChild(copyBtn);
    } else if (data.text) {
        data.text.split('\n').forEach((line, i) => {
            if (i > 0) textDiv.appendChild(document.createElement('br'));
            const p = document.createElement('span');
            p.textContent = line;
            textDiv.appendChild(p);
        });
    }
    
    // Preview
    if (data.previews && data.previews.length > 0) {
        data.previews.forEach(preview => {
            textDiv.appendChild(createLinkPreviewElement(preview));
        });
    }
    
    // Reactions
    if (data.reactions) {
        const reactionsContainer = document.createElement('div');
        reactionsContainer.className = 'reactions';
        ['❤️', '😂', '😮', '😢', '🔥'].forEach(emoji => {
            const count = data.reactions[emoji] || 0;
            const reacted = data.reactions[emoji + '_users'] && data.reactions[emoji + '_users'].includes(currentUserId);
            if (count > 0) {
                const span = document.createElement('span');
                span.className = 'reaction' + (reacted ? ' reacted' : '');
                span.innerHTML = emoji + ' <span class="count">' + count + '</span>';
                span.onclick = (e) => { e.stopPropagation(); toggleReaction(key, emoji); };
                reactionsContainer.appendChild(span);
            }
        });
        if (reactionsContainer.children.length > 0) bubble.appendChild(reactionsContainer);
    }
    
    bubble.appendChild(textDiv);
    
    const timeStatusWrap = document.createElement('div');
    timeStatusWrap.className = 'time-status';
    const time = document.createElement('div');
    time.className = 'time';
    time.textContent = data.timestamp ? formatTime(data.timestamp) : '';
    timeStatusWrap.appendChild(time);
    
    if (data.name === currentName) {
        const statusSpan = document.createElement('span');
        statusSpan.className = 'message-status';
        statusSpan.innerHTML = getStatusHTML(data.status || 'sent');
        timeStatusWrap.appendChild(statusSpan);
    }
    
    bubble.appendChild(timeStatusWrap);
    row.appendChild(bubble);
    
    // Double click for reactions
    row.addEventListener('dblclick', (e) => {
        e.stopPropagation();
        showReactionPopup(key, data, e);
    });
    
    // Context menu
    row.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        e.stopPropagation();
        showContextMenu(key, data);
    });
    
    let longPressTimer = null;
    row.addEventListener('touchstart', (e) => {
        if (e.target.closest('.reaction')) return;
        const touch = e.touches[0];
        longPressTimer = setTimeout(() => showContextMenu(key, data), 500);
    }, { passive: true });
    row.addEventListener('touchend', () => clearTimeout(longPressTimer), { passive: true });
    row.addEventListener('touchmove', () => clearTimeout(longPressTimer), { passive: true });
    
    return row;
}

function markAllAsRead() {
    messagesCache.forEach(msg => {
        if (msg.name !== currentName && (msg.to === currentName || !msg.to)) {
            if (msg.status !== 'read') markAsRead(msg.key);
        }
    });
}

function updateContactsFromCache() {
    const newContacts = {};
    messagesCache.forEach(item => {
        const contactId = item.to && item.to !== currentName ? item.to : (item.name !== currentName ? item.name : null);
        if (contactId) {
            if (!newContacts[contactId]) newContacts[contactId] = { lastMsg: '', time: '', timestamp: 0 };
            newContacts[contactId].lastMsg = item.text || (item.isFile ? '📎 Файл' : '');
            const ts = item.timestamp || 0;
            newContacts[contactId].time = ts ? formatTime(ts) : '';
            newContacts[contactId].timestamp = ts;
        }
        if (!item.to) {
            if (!newContacts['all']) newContacts['all'] = { lastMsg: '', time: '', timestamp: 0 };
            newContacts['all'].lastMsg = item.text || (item.isFile ? '📎 Файл' : '');
            const ts = item.timestamp || 0;
            newContacts['all'].time = ts ? formatTime(ts) : '';
            newContacts['all'].timestamp = ts;
        }
    });
    contacts = newContacts;
    renderChatList();
}

// ============================================================
// ОТПРАВКА СООБЩЕНИЙ
// ============================================================
function sendMessage(text) {
    if (!currentUser || !currentName || !currentUserId) return;
    
    if (currentGroupId) {
        // Групповое сообщение
        const payload = {
            name: currentName,
            userId: currentUserId,
            text: text || '',
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            status: 'sending'
        };
        groupMessagesRef.child(currentGroupId).push(payload);
        clearTypingStatus();
        return;
    }
    
    const to = currentContact === 'all' ? null : currentContact;
    const payload = {
        name: currentName,
        userId: currentUserId,
        text: text || '',
        to: to,
        timestamp: firebase.database.ServerValue.TIMESTAMP,
        status: 'sending'
    };
    const newRef = messagesRef.push(payload);
    processLinks(text, newRef.key);
    clearTypingStatus();
}

function sendText() {
    const text = messageInput.value.trim();
    if (!text) return;
    sendMessage(text);
    messageInput.value = '';
}

sendBtn.onclick = sendText;
messageInput.onkeydown = (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendText(); }
    if (e.key === 'Enter' && e.ctrlKey) {
        e.preventDefault();
        const start = messageInput.selectionStart;
        const end = messageInput.selectionEnd;
        messageInput.value = messageInput.value.substring(0, start) + '\n' + messageInput.value.substring(end);
        messageInput.selectionStart = messageInput.selectionEnd = start + 1;
    }
};

// ФАЙЛЫ
// ============================================================
fileBtn.addEventListener('click', () => {
    if (!currentUser) { alert('Войдите в систему'); return; }
    fileInput.click();
});
fileInput.onchange = (e) => {
    if (e.target.files.length) {
        const file = e.target.files[0];
        if (file.size > 100 * 1024 * 1024) { alert('Файл слишком большой (максимум 100MB)'); fileInput.value = ''; return; }
        shareFile(file);
        fileInput.value = '';
    }
};

function shareFile(file) {
    if (!currentUser) { alert('Войдите в систему'); return; }
    const to = currentContact === 'all' ? null : currentContact;
    showToast('📤 Загружаем файл "' + file.name + '"...');
    fileBtn.style.opacity = '0.5';
    fileBtn.disabled = true;
    uploadToGoFile(file).then((result) => {
        showToast('✅ Файл загружен!');
        const payload = {
            name: currentName,
            userId: currentUserId,
            text: result.directLink,
            fileName: result.fileName,
            fileSize: result.fileSize,
            isFile: true,
            to: to,
            timestamp: firebase.database.ServerValue.TIMESTAMP,
            status: 'sending'
        };
        if (currentGroupId) {
            groupMessagesRef.child(currentGroupId).push(payload);
        } else {
            messagesRef.push(payload);
        }
        fileBtn.style.opacity = '1';
        fileBtn.disabled = false;
    }).catch((err) => {
        showToast('❌ Ошибка загрузки: ' + err.message);
        fileBtn.style.opacity = '1';
        fileBtn.disabled = false;
    });
}

// ============================================================
// DRAG AND DROP
// ============================================================
let dragCounter = 0;
document.addEventListener('dragover', (e) => {
    e.preventDefault();
    const chatPanel = document.getElementById('chatPanel');
    if (chatPanel.contains(e.target) && currentUser) {
        dropZone.classList.add('active');
    }
});
document.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dragCounter--;
    if (dragCounter <= 0) { dropZone.classList.remove('active'); dragCounter = 0; }
});
document.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('active');
    dragCounter = 0;
    if (!currentUser) { alert('Войдите в систему'); return; }
    const files = e.dataTransfer.files;
    if (files.length > 0) {
        const file = files[0];
        if (file.size > 100 * 1024 * 1024) {
            alert('Файл слишком большой (максимум 100MB)');
            return;
        }
        shareFile(file);
    }
});

function updateNewMessagesBtn() {
    if (newMessagesCountVal > 0 && !isAtBottom) {
        newMessagesBtn.style.display = 'flex';
        newMessagesCount.textContent = newMessagesCountVal;
    } else {
        newMessagesBtn.style.display = 'none';
    }
}
newMessagesBtn.addEventListener('click', () => {
    messagesDiv.scrollTo({ top: messagesDiv.scrollHeight, behavior: 'smooth' });
    newMessagesCountVal = 0;
    updateNewMessagesBtn();
    isAtBottom = true;
    markAllAsRead();
    stopBlinking();
});
messagesDiv.addEventListener('scroll', () => {
    const threshold = 100;
    const atBottom = messagesDiv.scrollHeight - messagesDiv.scrollTop - messagesDiv.clientHeight < threshold;
    if (atBottom) {
        isAtBottom = true;
        newMessagesCountVal = 0;
        updateNewMessagesBtn();
        markAllAsRead();
        if (unreadTotal > 0) { unreadTotal = 0; updateBadge(); stopBlinking(); }
    } else {
        isAtBottom = false;
    }
});

// ============================================================
// БЛИНК ТАБА
// ============================================================
function startBlinking() {
    if (blinkInterval) return;
    let show = true;
    blinkInterval = setInterval(() => {
        show = !show;
        document.title = show ? '🔴 ICQ-чат' : 'ICQ-чат';
        const link = document.querySelector('link[rel="icon"]');
        if (link) {
            link.href = show ? 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🔴</text></svg>' : 
                               'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💬</text></svg>';
        }
    }, 800);
}
function stopBlinking() {
    if (blinkInterval) { clearInterval(blinkInterval); blinkInterval = null; }
    document.title = 'ICQ-чат';
    const link = document.querySelector('link[rel="icon"]');
    if (link) {
        link.href = 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">💬</text></svg>';
    }
}

}

});

            notifyToggle.classList.toggle('active');

            slider.style.transform = notificationsEnabled ? 'translateX(20px)' : 'translateX(0)';

    if (changeNameBtn) {

                usersRef.child(currentUser.uid).update({ name: trimmed });

                headerUsername.textContent = currentName;

                showSettingsModal();
                showToast('✅ Имя обновлено');

        });
    }
    const logoutModalBtn = document.getElementById('logoutModalBtn');
    if (logoutModalBtn) {
        logoutModalBtn.addEventListener('click', () => {
            closeModal();
            auth.signOut();
        });
    }

function findUserById(userId) {
    usersRef.orderByChild('userId').equalTo(userId).once('value').then(snap => {
        let found = false;
        snap.forEach(childSnap => {
            const data = childSnap.val();
            if (data.name && data.userId === userId) {
                if (data.userId === currentUserId) {
                    showToast('❌ Это ваш собственный ID');
                    return;
                }
                if (contactListArray.includes(data.name)) {
                    showToast('✅ Контакт уже в списке');
                    return;
                }
                addContact(data.name);
                found = true;
            }
        });
        if (!found) showToast('❌ Пользователь не найден');
    }).catch(() => showToast('❌ Ошибка поиска'));
}

// ============================================================
let peer = null;
let currentCall = null;
let localStream = null;
let remoteStream = null;
let peerInitialized = false;
let peerReconnectTimer = null;

function initPeer() {
    if (!currentUserId) return;
    if (peerInitialized) return;
    
    const peerId = 'user_' + currentUserId;
    
    peer = new Peer(peerId, {
        debug: 2,
        config: {
            iceServers: [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:stun3.l.google.com:19302' },
                { urls: 'stun:stun4.l.google.com:19302' },
                { urls: 'stun:stun.ekiga.net' },
                { urls: 'stun:stun.iptel.org' },
                {
                    urls: 'turn:numb.viagenie.ca',
                    credential: 'muazkh',
                    username: 'webrtc@live.com'
                }
            ],
            iceTransportPolicy: 'all',
            iceCandidatePoolSize: 10
        }
    });
    
    peer.on('open', (id) => {
        console.log('✅ PeerJS подключен:', id);
        peerInitialized = true;
        usersRef.child(currentUser.uid + '/peerId').set(id);
        showToast('✅ Голосовая связь готова');
        if (peerReconnectTimer) {
            clearTimeout(peerReconnectTimer);
            peerReconnectTimer = null;
        }
    });
    
    peer.on('call', (call) => {
        console.log('📞 Входящий звонок от:', call.peer);
        showIncomingCall(call);
    });
    
    peer.on('error', (err) => {
        console.error('❌ PeerJS error:', err);
        if (err.message.includes('Lost connection') || err.message.includes('Could not connect')) {
            showToast('⚠️ Потеря соединения, переподключение...');
            peerReconnectTimer = setTimeout(() => {
                if (!peerInitialized) {
                    peer.destroy();
                    peer = null;
                    peerInitialized = false;
                    initPeer();
                }
            }, 3000);
        } else if (err.message.includes('unavailable ID')) {
            const newId = 'user_' + currentUserId + '_' + Date.now().toString(36);
            peer.destroy();
            peer = new Peer(newId, {
                debug: 2,
                config: {
                    iceServers: [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' },
                        { urls: 'stun:stun.ekiga.net' }
                    ]
                }
            });
            peer.on('open', (id) => {
                usersRef.child(currentUser.uid + '/peerId').set(id);
                peerInitialized = true;
            });
        }
    });
    
    peer.on('close', () => {
        console.log('🔌 PeerJS соединение закрыто');
        peerInitialized = false;
        if (!peerReconnectTimer) {
            peerReconnectTimer = setTimeout(() => {
                peer = null;
                initPeer();
            }, 5000);
        }
    });
    
    setTimeout(() => {
        if (!peerInitialized) {
            console.warn('⚠️ PeerJS подключение зависло, перезапуск...');
            if (peer) {
                peer.destroy();
                peer = null;
            }
            initPeer();
        }
    }, 10000);
}

function startCall(contactName, video = false) {
    if (!peer || !peerInitialized) {
        showToast('❌ Соединение не готово, попробуйте позже');
        return;
    }
    usersRef.orderByChild('name').equalTo(contactName).once('value').then(snap => {
        let targetPeerId = null;
        snap.forEach(childSnap => {
            const data = childSnap.val();
            if (data.peerId) targetPeerId = data.peerId;
        });
        if (!targetPeerId) { showToast('❌ Контакт не в сети'); return; }
        showCallUI(contactName, 'Звонок...', video);
        navigator.mediaDevices.getUserMedia({ audio: true, video: video })
            .then(stream => {
                localStream = stream;
                const call = peer.call(targetPeerId, stream, { 
                    metadata: { caller: currentName, video: video } 
                });
                currentCall = call;
                setupCallListeners(call);
            }).catch(err => {
                showToast('❌ Нет доступа к микрофону/камере');
                hideCallUI();
            });
    }).catch(err => showToast('❌ Ошибка: ' + err.message));
}

function setupCallListeners(call) {
    call.on('stream', (stream) => {
        remoteStream = stream;
        document.getElementById('callStatus').textContent = 'В разговоре';
        const container = document.getElementById('callVideoContainer');
        if (container) {
            const video = document.createElement('video');
            video.autoplay = true;
            video.srcObject = stream;
            video.style.cssText = 'width:100%;max-height:200px;border-radius:12px;background:#000;margin:8px 0;object-fit:cover;';
            container.innerHTML = '';
            container.appendChild(video);
        }
    });
    call.on('close', () => endCall());
}

function showIncomingCall(call) {
    const caller = call.metadata?.caller || 'Неизвестный';
    const isVideo = call.metadata?.video || false;
    showModal(`
        <div style="text-align:center;">
            <div style="font-size:48px;margin:16px 0;">${isVideo ? '📹' : '📞'}</div>
            <div style="font-size:20px;font-weight:600;color:var(--text-primary);">${caller}</div>
            <div style="color:var(--text-secondary);margin:4px 0 20px;">Входящий звонок...</div>
            <div style="display:flex;gap:16px;justify-content:center;">
                <button onclick="answerCall(true)" style="width:64px;height:64px;border-radius:50%;border:none;background:var(--success);color:#fff;font-size:28px;cursor:pointer;">📞</button>
                <button onclick="declineCall()" style="width:64px;height:64px;border-radius:50%;border:none;background:var(--danger);color:#fff;font-size:28px;cursor:pointer;">✕</button>
            </div>
        </div>
    `);
    window._incomingCall = call;
    window._incomingCaller = caller;
    window._incomingVideo = isVideo;
}

function answerCall(withVideo = false) {
    closeModal();
    const call = window._incomingCall;
    if (!call) return;
    const isVideo = window._incomingVideo || withVideo;
    const caller = window._incomingCaller || 'Собеседник';
    showCallUI(caller, 'Соединение...', isVideo);
    navigator.mediaDevices.getUserMedia({ audio: true, video: isVideo })
        .then(stream => {
            localStream = stream;
            call.answer(stream);
            currentCall = call;
            setupCallListeners(call);
            document.getElementById('callStatus').textContent = 'В разговоре';
        }).catch(err => {
            showToast('❌ Нет доступа к микрофону/камере');
            hideCallUI();
        });
}

function declineCall() {
    closeModal();
    if (window._incomingCall) window._incomingCall.close();
    showToast('📞 Звонок отклонён');
}

function showCallUI(contactName, status, video = false) {
    const overlay = document.getElementById('callOverlay');
    document.getElementById('callName').textContent = contactName;
    document.getElementById('callStatus').textContent = status;
    document.getElementById('callAvatar').textContent = video ? '📹' : '📞';
    overlay.classList.add('active');
    if (localStream && video) {
        const container = document.getElementById('callVideoContainer');
        const videoEl = document.createElement('video');
        videoEl.autoplay = true;
        videoEl.muted = true;
        videoEl.srcObject = localStream;
        videoEl.style.cssText = 'width:100%;max-height:200px;border-radius:12px;background:#000;margin:8px 0;object-fit:cover;';
        container.innerHTML = '';
        container.appendChild(videoEl);
    }
}

function hideCallUI() {
    document.getElementById('callOverlay').classList.remove('active');
    document.getElementById('callVideoContainer').innerHTML = '';
}

function endCall() {
    if (currentCall) { currentCall.close(); currentCall = null; }
    if (localStream) { localStream.getTracks().forEach(t => t.stop()); localStream = null; }
    if (remoteStream) { remoteStream.getTracks().forEach(t => t.stop()); remoteStream = null; }
    hideCallUI();
    showToast('📞 Звонок завершён');
}

auth.onAuthStateChanged(user => {
    if (user) {
        currentUser = user;
        usersRef.child(user.uid).once('value').then(snap => {
            const data = snap.val() || {};
            let name = data.name;
            let userId = data.userId;
            if (!userId) {
                userId = generateUserId();
                usersRef.child(user.uid).update({ userId });
            }
            if (!name || name.startsWith('Гость')) {
                if (user.email) name = user.email.split('@')[0];
                else name = 'Гость' + Math.floor(Math.random() * 10000);
                usersRef.child(user.uid).update({ name });
            }
            currentName = name;
            currentUserId = userId;
            headerUsername.textContent = currentName;
            updateHeaderAvatar();
            messageInput.disabled = false;
            sendBtn.disabled = false;
            statusDiv.textContent = '✅ Подключено';
            statusDiv.className = 'status-bar';
            loadContacts();
            loadGroups();
            switchContact('all');
            setupOnlineStatus();
            onlineRef.on('value', () => updateOnlineDots());
            usersRef.once('value', (snapshot) => {
                const data = snapshot.val() || {};
                Object.keys(data).forEach(uid => {
                    const u = data[uid];
                    if (u.name && u.avatar) setAvatarCache(u.name, u.avatar);
                });
                renderChatList();
            });
            if ("Notification" in window && Notification.permission === "default") {
                Notification.requestPermission();
            }
            // Инициализация PeerJS для звонков
            setTimeout(initPeer, 1000);
        });
    } else {
        if (onlineInterval) { clearInterval(onlineInterval); onlineInterval = null; }
        if (currentUserId) onlineRef.child(sanitizeKey(currentUserId)).remove();
        currentUser = null;
        currentName = '';
        currentUserId = '';
        headerUsername.textContent = '—';
        myAvatar.style.backgroundImage = '';
        myAvatar.textContent = '?';
        messageInput.disabled = true;
        sendBtn.disabled = true;
        statusDiv.textContent = '⏳ Войдите или зарегистрируйтесь';
        messagesDiv.innerHTML = '';
        chatList.innerHTML = '';
        messagesRef.off();
        messageListenerStarted = false;
        contacts = {};
        contactListArray = [];
        unreadCounts = {};
        unreadTotal = 0;
        stopBlinking();
        clearTypingListeners();
        typingIndicator.style.display = 'none';
        smartReplies.classList.remove('active');
        showLoginModal();
    }
});

function showLoginModal() {
    showModal(`
        <div class="modal-header">
            <h2>🔐 Вход</h2>
        </div>
        <div style="display:flex;flex-direction:column;gap:12px;">
            <input type="email" id="loginEmail" placeholder="Email" class="input-field">
            <input type="password" id="loginPassword" placeholder="Пароль" class="input-field">
            <button id="loginSubmitBtn" style="background:var(--accent);color:#fff;border:none;border-radius:12px;padding:12px;font-size:16px;font-weight:600;cursor:pointer;min-height:44px;">Войти</button>
            <button id="registerSubmitBtn" style="background:var(--bg-secondary);color:var(--text-primary);border:1px solid var(--border-color);border-radius:12px;padding:12px;font-size:14px;cursor:pointer;min-height:44px;">Регистрация</button>
        </div>
    `);
    document.getElementById('loginSubmitBtn').addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPassword').value.trim();
        if (!email || !pass) { alert('Введите email и пароль'); return; }
        auth.signInWithEmailAndPassword(email, pass).catch(err => alert('Ошибка: ' + err.message));
    });
    document.getElementById('registerSubmitBtn').addEventListener('click', () => {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPassword').value.trim();
        if (!email || !pass) { alert('Введите email и пароль'); return; }
        auth.createUserWithEmailAndPassword(email, pass)
            .then((cred) => {
                const name = email.split('@')[0];
                const userId = generateUserId();
                return usersRef.child(cred.user.uid).set({ name, userId });
            })
            .catch(err => alert('Ошибка: ' + err.message));
    });
}
